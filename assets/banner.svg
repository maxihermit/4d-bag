<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" rx="16" fill="#0f172a"/>

  <!-- Ugly blue cat body -->
  <ellipse cx="160" cy="190" rx="75" ry="85" fill="#38bdf8" stroke="#0ea5e9" stroke-width="3"/>

  <!-- Head -->
  <circle cx="160" cy="115" r="62" fill="#38bdf8" stroke="#0ea5e9" stroke-width="3"/>

  <!-- Ears (wonky on purpose) -->
  <polygon points="115,65 100,30 130,55" fill="#38bdf8" stroke="#0ea5e9" stroke-width="3"/>
  <polygon points="205,65 220,25 190,55" fill="#38bdf8" stroke="#0ea5e9" stroke-width="3"/>
  <polygon points="118,62 108,40 130,55" fill="#fda4af"/>
  <polygon points="202,62 212,35 192,55" fill="#fda4af"/>

  <!-- Eyes (derpy) -->
  <circle cx="140" cy="105" r="14" fill="white"/>
  <circle cx="180" cy="105" r="14" fill="white"/>
  <circle cx="144" cy="108" r="7" fill="#0f172a"/>
  <circle cx="176" cy="102" r="7" fill="#0f172a"/>
  <circle cx="146" cy="106" r="2.5" fill="white"/>
  <circle cx="178" cy="100" r="2.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="160" cy="120" rx="5" ry="4" fill="#f43f5e"/>

  <!-- Mouth (goofy smile) -->
  <path d="M140,130 Q150,145 160,130 Q170,145 180,130" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="100" y1="115" x2="130" y2="120" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="98" y1="128" x2="128" y2="128" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="190" y1="120" x2="220" y2="115" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="192" y1="128" x2="222" y2="128" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Belly pocket (the 4D pocket!) -->
  <ellipse cx="160" cy="210" rx="32" ry="28" fill="white" stroke="#0ea5e9" stroke-width="2"/>
  <text x="160" y="216" text-anchor="middle" font-size="18" font-family="monospace" font-weight="bold" fill="#0ea5e9">4D</text>

  <!-- Paws -->
  <circle cx="120" cy="265" r="16" fill="white" stroke="#0ea5e9" stroke-width="2"/>
  <circle cx="200" cy="265" r="16" fill="white" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Tail (wonky) -->
  <path d="M235,220 Q270,200 255,170" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>

  <!-- Title text -->
  <text x="420" y="100" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="white">4d-bag</text>
  <text x="420" y="140" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8">四次元百寶袋</text>

  <!-- Tagline -->
  <text x="420" y="185" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8">Discover</text>
  <text x="520" y="185" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">trending open-source projects</text>

  <text x="420" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8">Evaluate</text>
  <text x="520" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">relevance to your projects</text>

  <text x="420" y="235" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8">Audit</text>
  <text x="520" y="235" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">security before you adopt</text>

  <!-- Platform badges -->
  <rect x="420" y="260" width="95" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="467" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Claude Code</text>

  <rect x="525" y="260" width="65" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="557" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Codex</text>

  <rect x="600" y="260" width="65" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="632" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Cursor</text>

  <rect x="675" y="260" width="65" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="707" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Copilot</text>
</svg>
